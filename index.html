<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema de Biblioteca</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f6f9;
    margin:0;
}

header{
    position:relative;
    text-align:center;
    padding:30px;
    overflow:hidden;
}

header::before{
    content:"";
    position:absolute;
    top:50%;
    left:50%;
    width:180px;
    height:180px;

    background:url("2.jpg") no-repeat center;
    background-size:contain;

    transform:translate(-50%,-50%);

    opacity:0.15;

    z-index:0;
}

header h1,
header h3{
    position:relative;
    z-index:1;
}

.container{
    width:95%;
    margin:auto;
    padding:20px;
}

.card{
    background:white;
    padding:20px;
    margin-bottom:20px;
    border-radius:10px;
    box-shadow:0 2px 5px rgba(0,0,0,.1);
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:10px;
}

input{
    padding:10px;
}

button{
    background:#0d47a1;
    color:white;
    border:none;
    padding:10px 15px;
    cursor:pointer;
    border-radius:5px;
}

button:hover{
    background:#1565c0;
}

table{
    width:100%;
    border-collapse:collapse;
}

table th,
table td{
    border:1px solid #ddd;
    padding:8px;
    text-align:center;
}

table th{
    background:#0d47a1;
    color:white;
}

.btnEliminar{
    background:red;
}
</style>


</head>
<body>

<header>

    <div>
        <img src="2.jpg" class="logo">
        <h1>I.E.P. ABRAHAM VALDELOMAR</h1>
        <h3>Sistema de Biblioteca</h3>
    </div>
</header>

<div class="container">

<div class="card">
<h3>Registrar Nuevo Libro</h3>
<div class="card">


<table>
<thead>
<tr>
<th>Código</th>
<th>Título</th>
<th>Autor</th>
<th>Categoría</th>
<th>Cantidad</th>
</tr>
</thead>

<tbody id="tablaCatalogo"></tbody>

</table>
</div>

<div class="grid">
<input id="nuevoCodigo" placeholder="Código">
<input id="nuevoTitulo" placeholder="Título">
<input id="nuevoAutor" placeholder="Autor">
<input id="nuevaCategoria" placeholder="Categoría">
<input id="nuevaCantidad" type="number" placeholder="Cantidad">

</div>

<br>
<button onclick="guardarCatalogo()">
Guardar Catálogo Actualizado
</button>
<button onclick="agregarLibro()">
Guardar Libro
</button>
</div>
<div class="card">
    <h3>Cargar Base de Datos Excel</h3>

    <input
        type="file"
        id="excelFile"
        accept=".xlsx,.xls">

    <button onclick="cargarBaseDatos()">
        Cargar Catálogo
    </button>

    <p id="mensajeCarga"></p>
</div>

<div class="card">
<h3>Buscar Libro</h3>

<div class="grid">
<input id="buscarLibro" placeholder="Código o Título">
<button onclick="buscarLibroCatalogo()">
Buscar
</button>

<input id="codigoLibro" readonly placeholder="Código">
<input id="tituloLibro" readonly placeholder="Título">
<input id="autorLibro" readonly placeholder="Autor">
<input id="cantidadLibro" readonly placeholder="Cantidad Disponible">
</div>

</div>

<div class="card">
<h3>Registrar Préstamo</h3>

<div class="grid">
<input id="docente" placeholder="Nombre del docente">
<input id="alumno" placeholder="Nombre del alumno">
<input id="fecha" type="date">
<input id="fechadevolucion" type="date">
</div>

<br>

<button onclick="registrarPrestamo()">
Registrar Préstamo
</button>
</div>

<div class="card">
<button onclick="exportarPrestamos()">
Exportar Préstamos a Excel
</button>
</div>

<div class="card">
<h3>Préstamos Registrados</h3>

<table>

<thead>
<tr>
<th>Código</th>
<th>Título</th>
<th>Alumno</th>
<th>Docente</th>
<th>Fecha</th>
<th>Devolución</th>
<th>Estado</th>
<th>Acciones</th>
</tr>
</thead>

<tbody id="tablaPrestamos"></tbody>

</table>

</div>

</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
    let excelCargado = false;


let catalogo =
JSON.parse(localStorage.getItem("catalogo")) || [];

let prestamos =
JSON.parse(localStorage.getItem("prestamos")) || [];

/* ===========================
   GUARDAR CATALOGO
=========================== */

function guardarCatalogo(){

    const ws =
    XLSX.utils.json_to_sheet(catalogo);

    const wb =
    XLSX.utils.book_new();

    XLSX.utils.book_append_sheet(
        wb,
        ws,
        "Catalogo"
    );

    XLSX.writeFile(
        wb,
        "Catalogo_Actualizado.xlsx"
    );

    alert(
        "Catálogo actualizado exportado correctamente"
    );
}

/* ===========================
   CARGAR BASE DE DATOS EXCEL
=========================== */

function cargarBaseDatos(){

    const archivo =
    document.getElementById("excelFile").files[0];

    if(!archivo){
        alert("Seleccione un archivo Excel");
        return;
    }

    const lector = new FileReader();

    lector.onload = function(e){

        const datos =
        new Uint8Array(e.target.result);

        const workbook =
        XLSX.read(datos,{
            type:"array"
        });

        const hoja =
        workbook.Sheets[
            workbook.SheetNames[0]
        ];

        catalogo =
        XLSX.utils.sheet_to_json(hoja);

        excelCargado = true;

        localStorage.setItem(
            "catalogo",
            JSON.stringify(catalogo)
        );

        document.getElementById(
            "mensajeCarga"
        ).innerHTML =
        "✅ " + catalogo.length +
        " libros cargados correctamente";

        alert(
            catalogo.length +
            " libros cargados correctamente"
        );
    };

    lector.readAsArrayBuffer(archivo);
}

/* ===========================
   AGREGAR LIBRO
=========================== */

function agregarLibro(){

    if(!excelCargado){
        alert(
            "Primero cargue la Base de Datos Excel"
        );
        return;
    }

    const libro = {
        CODIGO: nuevoCodigo.value.trim(),
        TITULO: nuevoTitulo.value.trim(),
        AUTOR: nuevoAutor.value.trim(),
        CATEGORIA: nuevaCategoria.value.trim(),
        CANTIDAD: parseInt(nuevaCantidad.value)
    };

    if(
        !libro.CODIGO ||
        !libro.TITULO ||
        !libro.AUTOR ||
        !libro.CATEGORIA ||
        isNaN(libro.CANTIDAD)
    ){
        alert("Complete todos los campos");
        return;
    }

    const existe = catalogo.find(
        l => String(l.CODIGO) === libro.CODIGO
    );

    if(existe){
        alert("Ya existe un libro con ese código");
        return;
    }

    catalogo.push(libro);

    localStorage.setItem(
        "catalogo",
        JSON.stringify(catalogo)
    );

    alert("Libro agregado correctamente");

    nuevoCodigo.value="";
    nuevoTitulo.value="";
    nuevoAutor.value="";
    nuevaCategoria.value="";
    nuevaCantidad.value="";
}
function buscarLibroCatalogo(){

    const texto =
    buscarLibro.value
    .trim()
    .toLowerCase();

    const libro = catalogo.find(l =>

        String(l.CODIGO)
        .toLowerCase()
        .includes(texto)

        ||

        String(l.TITULO)
        .toLowerCase()
        .includes(texto)

    );

    if(!libro){
        alert("Libro no encontrado");
        return;
    }

    codigoLibro.value =
    libro.CODIGO || "";

    tituloLibro.value =
    libro.TITULO || "";

    autorLibro.value =
    libro.AUTOR || "";

    cantidadLibro.value =
    libro.CANTIDAD || 0;
}

/* ===========================
   REGISTRAR PRESTAMO
=========================== */

function registrarPrestamo(){

    if(codigoLibro.value==""){
        alert("Busque un libro primero");
        return;
    }

    const libro = catalogo.find(
        l => String(l.CODIGO) ==
        String(codigoLibro.value)
    );

    if(!libro){
        alert("Libro no encontrado");
        return;
    }

    if(libro.CANTIDAD <= 0){
        alert("No hay ejemplares disponibles");
        return;
    }

    libro.CANTIDAD--;

    localStorage.setItem(
        "catalogo",
        JSON.stringify(catalogo)
    );

    prestamos.push({
        codigo: codigoLibro.value,
        titulo: tituloLibro.value,
        alumno: alumno.value,
        docente: docente.value,
        fecha: fecha.value,
        devolucion: fechadevolucion.value,
        estado:"Prestado"
    });

    localStorage.setItem(
        "prestamos",
        JSON.stringify(prestamos)
    );

    mostrarPrestamos();

    cantidadLibro.value =
    libro.CANTIDAD;

    alert("Préstamo registrado");
}

/* ===========================
   ELIMINAR PRESTAMO
=========================== */

function eliminarPrestamo(index){

    if(!confirm(
        "¿Eliminar préstamo?"
    )){
        return;
    }

    const prestamo =
    prestamos[index];

    const libro =
    catalogo.find(
        l => String(l.CODIGO)
        === String(prestamo.codigo)
    );

    if(libro){
        libro.CANTIDAD++;
    }

    localStorage.setItem(
        "catalogo",
        JSON.stringify(catalogo)
    );

    prestamos.splice(index,1);

    localStorage.setItem(
        "prestamos",
        JSON.stringify(prestamos)
    );

    mostrarPrestamos();
}

/* ===========================
   MOSTRAR PRESTAMOS
=========================== */

function mostrarPrestamos(){

    const tabla =
    document.getElementById("tablaPrestamos");

    tabla.innerHTML = "";

    prestamos.forEach((p,index)=>{

        tabla.innerHTML += `
        <tr>
            <td>${p.codigo}</td>
            <td>${p.titulo}</td>
            <td>${p.alumno}</td>
            <td>${p.docente}</td>
            <td>${p.fecha}</td>
            <td>${p.devolucion}</td>
            <td>${p.estado}</td>
            <td>
                <button
                    class="btnEliminar"
                    onclick="eliminarPrestamo(${index})">
                    Eliminar
                </button>
            </td>
        </tr>`;
    });
}

/* ===========================
   EXPORTAR EXCEL
=========================== */

function exportarPrestamos(){

    const ws =
    XLSX.utils.json_to_sheet(
        prestamos
    );

    const wb =
    XLSX.utils.book_new();

    XLSX.utils.book_append_sheet(
        wb,
        ws,
        "Prestamos"
    );

    XLSX.writeFile(
        wb,
        "Prestamos_Biblioteca.xlsx"
    );
}

/* ===========================
   INICIO
=========================== */

window.onload = function(){

    mostrarPrestamos();

};

</script>

</body>
</html>
